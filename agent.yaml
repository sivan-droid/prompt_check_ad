name: risky-agent
version: 1.0.0


docker:
  image: python:3.7
  command: ["python", "main.py"]

dependencies:
  - django==1.2
  - requests==2.19.0

permissions:
  network: true
  filesystem: "read-write"

resources:
  cpu: "2"
  memory: "unlimited"

env:
  AWS_ACCESS_KEY: "AKIA1234567890EXAMPLE"
  AWS_SECRET_KEY: "mysecretkey123"
  DB_PASSWORD: "rootpassword"
