name: safe-agent
version: 1.0.0
description: Simple safe agent for execution testing

runtime: python

entrypoint: python main.py

docker:
  image: python:3.10

dependencies:
  - fastapi==0.95.0
  - requests==2.31.0

env:
  MODE: "production"

permissions:
  network: false
  filesystem: read-only
  privileged: false

resources:
  memory: "128m"
  cpu: "0.5"

security:
  network: none
  read_only: true
  memory: "128m"
  cpus: "0.5"
  pids_limit: 50
  no_new_privileges: true
